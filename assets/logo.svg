<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">Logo Lehema Pijamas</title>
  <desc id="desc">Logotipo con la palabra Lehema en color lila, la palabra Pijamas debajo a la derecha y un ícono decorativo dorado arriba a la derecha.</desc>
  <rect width="1200" height="470" fill="#ffffff"/>

  <!-- Main brand name -->
  <text x="110" y="255"
        fill="#C8B2E4"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="200"
        font-weight="400"
        letter-spacing="1">Lehema</text>

  <!-- Sub-brand -->
  <text x="745" y="330"
        fill="#C8B2E4"
        font-family="Arial, Helvetica, sans-serif"
        font-size="64"
        font-weight="300"
        letter-spacing="0.5">Pijamas</text>

  <!-- Decorative golden icon -->
  <g transform="translate(900,35)" fill="#D7B155">
    <path d="M80 0C96 10 100 34 89 56C77 81 59 92 42 106C37 82 30 64 32 45C34 21 56 2 80 0Z"/>
    <path d="M124 10C149 26 157 54 148 82C139 110 116 127 92 144C85 113 82 84 87 60C92 35 104 18 124 10Z"/>
    <path d="M32 18C50 27 58 46 55 68C51 94 33 111 11 126C4 99 1 76 5 57C9 40 16 27 32 18Z"/>
    <circle cx="160" cy="96" r="4"/>
    <circle cx="8" cy="144" r="5"/>
  </g>
</svg>
